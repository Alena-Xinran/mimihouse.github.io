<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵屋～ | mimi.house</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fce4ec;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            color: #d81b60;
            margin-bottom: 0.3rem;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .subtitle {
            font-size: 1rem;
            color: #e91e63;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            opacity: 0.7;
        }

        .photo {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(216, 27, 96, 0.15);
        }
    </style>
</head>
<body>
    <canvas class="bg-canvas" id="bg"></canvas>
    <div class="container">
        <h1>喵屋～</h1>
        <p class="subtitle">mimi.house</p>
        <img src="mimi.jpg" alt="Mimi" class="photo">
    </div>
    <script>
    (() => {
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Soft color palette — pinks, lavenders, peach
        const blobs = [
            { cx: 0.2, cy: 0.3, r: 0.45, sx: 0.4,  sy: 0.3,  color: [252, 187, 208] }, // #fcbbd0 pink
            { cx: 0.8, cy: 0.2, r: 0.5,  sx: 0.3,  sy: 0.5,  color: [243, 229, 245] }, // #f3e5f5 lavender
            { cx: 0.5, cy: 0.8, r: 0.4,  sx: 0.5,  sy: 0.25, color: [248, 187, 208] }, // #f8bbd0 rose
            { cx: 0.1, cy: 0.7, r: 0.35, sx: 0.25, sy: 0.4,  color: [255, 224, 178] }, // #ffe0b2 peach
            { cx: 0.7, cy: 0.6, r: 0.4,  sx: 0.35, sy: 0.35, color: [225, 190, 231] }, // #e1bee7 purple
            { cx: 0.4, cy: 0.1, r: 0.38, sx: 0.45, sy: 0.3,  color: [248, 200, 220] }, // warm pink
        ];

        function draw(t) {
            // Base fill
            ctx.fillStyle = '#fce4ec';
            ctx.fillRect(0, 0, w, h);

            for (const b of blobs) {
                // Each blob orbits around its home position
                const x = (b.cx + 0.15 * Math.sin(t * b.sx + b.cy * 10)) * w;
                const y = (b.cy + 0.12 * Math.cos(t * b.sy + b.cx * 10)) * h;
                const r = b.r * Math.max(w, h);

                // Pulsing radius
                const pulse = 1 + 0.08 * Math.sin(t * 0.7 + b.cx * 5);

                const grad = ctx.createRadialGradient(x, y, 0, x, y, r * pulse);
                const [cr, cg, cb] = b.color;
                grad.addColorStop(0, `rgba(${cr},${cg},${cb},0.6)`);
                grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},0.25)`);
                grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);

                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }

            requestAnimationFrame(() => draw(performance.now() / 1000));
        }

        draw(0);
    })();
    </script>
</body>
</html>
